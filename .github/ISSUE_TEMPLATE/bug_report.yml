name: "Bug Report"
description: "Create a report to help us resolve an issue."
type: Bug
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A clear and concise description of what the bug is."
    validations:
      required: true
  - type: textarea
    id: reprod
    attributes:
      label: "Minimal Reproducible Example"
      description: "An example of steps, code, or other minimal requirements to reproduce the issue."
      value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
      render: bash
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any additional information to help explain the issue, including screenshots or videos."
      value: |
        ![DESCRIPTION](LINK.png)
      render: bash
    validations:
      required: false
  - type: input
    id: server-listing
    attributes:
      label: "Server Listing"
      placeholder: "https://servers.fivem.net/servers/detail/xxxxxxx"
  - type: input
    id: server-version
    attributes:
      label: "FXServer Version"
      placeholder: "25770"
    validations:
      required: true
  - type: dropdown
    id: client-version
    attributes:
      label: "Client Version"
      options:
        - Release
        - Beta
        - Canary
    validations:
      required: true
  - type: dropdown
    id: game
    attributes:
      label: "Game"
      options:
       - FiveM
       - RedM
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
      - label: "I am certain this issue is not related to a third-party script"
        required: false
      - label: "I am using an official (unmodified) release build"
        required: false
    validations:
      required: false
